<!-- ===== HUD BAR ===== -->
<div id="hud">
  <div class="hud-left">
    <div class="hud-level" id="hud-level">
      <img class="hud-star" id="hud-star-img" src="" alt=""><span class="level-num">1</span>
    </div>
    <div class="hud-xp">
      <div class="xp-bar-bg" id="xp-bar-bg-img"></div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="hud-xp-bar" style="width:0%"></div>
      </div>
      <span class="xp-text" id="hud-xp-text">0/20</span>
    </div>
  </div>
  <div class="hud-right">
    <div class="hud-currency" id="hud-streak">
      <span class="streak-fire">🔥</span>
      <span id="streak-count">0</span>
    </div>
    <div class="hud-currency hud-coins" id="hud-coins">
      <span class="currency-icon">🪙</span>
      <span id="coin-count">50</span>
    </div>
    <div class="hud-currency hud-gems" id="hud-gems">
      <span class="currency-icon">💎</span>
      <span id="gem-count">5</span>
    </div>
  </div>
</div>

<!-- ===== EVENT BANNER ===== -->
<div id="event-banner" style="display:none"></div>

<!-- ===== NOTIFICATION AREA ===== -->
<div id="notification-area"></div>

<!-- ===== FARM WORLD ===== -->
<div id="farm-container">
  <div id="farm-sky"></div>
  <div id="farm-world">
    <!-- Isometric farm grid -->
    <div id="farm-fields">
      <div class="section-label">🌾 Fields</div>
      <div id="plots-grid"></div>
    </div>

    <!-- Buildings zone -->
    <div id="farm-buildings">
      <div class="section-label">🏭 Workshop</div>
      <div id="buildings-area"></div>
    </div>

    <!-- Animals zone -->
    <div id="farm-animals">
      <div class="section-label">🐄 Pasture</div>
      <div id="animals-area"></div>
    </div>

    <!-- Floating layers -->
    <div id="decorations-layer"></div>
    <div id="mystery-boxes-layer"></div>
    <div id="reward-layer"></div>
  </div>
</div>

<!-- ===== BOTTOM TOOLBAR ===== -->
<div id="toolbar">
  <button class="tool-btn active" onclick="showTab('farm')" id="tab-farm">
    <span class="tool-icon">🌾</span><span class="tool-label">Farm</span>
  </button>
  <button class="tool-btn" onclick="showTab('buildings')" id="tab-buildings">
    <span class="tool-icon">🏭</span><span class="tool-label">Build</span>
  </button>
  <button class="tool-btn" onclick="showTab('inventory')" id="tab-inventory">
    <span class="tool-icon">📦</span><span class="tool-label">Bag</span>
  </button>
  <button class="tool-btn" onclick="showTab('orders')" id="tab-orders">
    <span class="tool-icon">🚚</span><span class="tool-label">Orders</span>
  </button>
  <button class="tool-btn" onclick="showTab('shop')" id="tab-shop">
    <span class="tool-icon">🏪</span><span class="tool-label">Shop</span>
  </button>
  <button class="tool-btn" onclick="showTab('achievements')" id="tab-achievements">
    <span class="tool-icon">🏆</span><span class="tool-label">Awards</span>
  </button>
  <button class="tool-btn wheel-btn" onclick="spinWheel()" id="tab-wheel">
    <span class="tool-icon">🎡</span><span class="tool-label">Wheel</span>
  </button>
</div>

<!-- ===== PANELS ===== -->
<div id="panel-inventory" class="panel hidden">
  <div class="panel-handle"></div>
  <div class="panel-header"><h2>📦 Inventory</h2><button class="close-btn" onclick="hidePanel()">✕</button></div>
  <div class="panel-subheader">
    <span id="barn-status">🏚️ Barn: 0/50</span>
    <span id="silo-status">🏭 Silo: 0/50</span>
  </div>
  <div id="inventory-grid" class="item-grid"></div>
</div>

<div id="panel-buildings" class="panel hidden">
  <div class="panel-handle"></div>
  <div class="panel-header"><h2>🏭 Buildings</h2><button class="close-btn" onclick="hidePanel()">✕</button></div>
  <div id="buildings-list"></div>
</div>

<div id="panel-orders" class="panel hidden">
  <div class="panel-handle"></div>
  <div class="panel-header"><h2>🚚 Orders</h2><button class="close-btn" onclick="hidePanel()">✕</button></div>
  <div id="orders-list"></div>
</div>

<div id="panel-shop" class="panel hidden">
  <div class="panel-handle"></div>
  <div class="panel-header"><h2>🏪 Shop</h2><button class="close-btn" onclick="hidePanel()">✕</button></div>
  <div class="shop-tabs">
    <button class="shop-tab active" onclick="showShopCategory('decorations')">Decor</button>
    <button class="shop-tab" onclick="showShopCategory('animals')">Animals</button>
    <button class="shop-tab" onclick="showShopCategory('upgrades')">Upgrade</button>
    <button class="shop-tab" onclick="showShopCategory('land')">Land</button>
  </div>
  <div id="shop-grid" class="item-grid"></div>
</div>

<div id="panel-achievements" class="panel hidden">
  <div class="panel-handle"></div>
  <div class="panel-header"><h2>🏆 Achievements</h2><button class="close-btn" onclick="hidePanel()">✕</button></div>
  <div id="achievements-list"></div>
</div>

<!-- ===== OVERLAYS ===== -->
<div id="wheel-overlay" class="overlay hidden">
  <div class="overlay-card wheel-container">
    <h2>🎡 Wheel of Fortune</h2>
    <div id="wheel-canvas-wrapper">
      <canvas id="wheel-canvas" width="280" height="280"></canvas>
      <div id="wheel-pointer">▼</div>
    </div>
    <button id="wheel-spin-btn" class="action-btn" onclick="doSpinWheel()">Spin!</button>
    <div id="wheel-result" class="hidden"></div>
    <button class="close-btn overlay-close" onclick="hideOverlay()">✕</button>
  </div>
</div>

<div id="mystery-box-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>🎁 Mystery Box</h2>
    <div id="mystery-box-animation"><div class="box-icon" id="box-icon">📦</div></div>
    <div id="mystery-box-result" class="hidden"></div>
    <button id="open-box-btn" class="action-btn" onclick="doOpenBox()">Open!</button>
    <button class="close-btn overlay-close" onclick="hideOverlay()">✕</button>
  </div>
</div>

<div id="levelup-overlay" class="overlay hidden">
  <div class="overlay-card levelup-card">
    <div class="levelup-stars">⭐✨⭐✨⭐</div>
    <h1>Level Up!</h1>
    <div id="levelup-level" class="levelup-number"></div>
    <div id="levelup-rewards"></div>
    <div id="levelup-unlocks"></div>
    <button class="action-btn" onclick="hideLevelUp()">Continue</button>
  </div>
</div>

<div id="plant-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>🌱 Plant a Crop</h2>
    <div id="crop-choices"></div>
    <button class="close-btn overlay-close" onclick="hideOverlay()">✕</button>
  </div>
</div>

<div id="production-overlay" class="overlay hidden">
  <div class="overlay-card production-card">
    <h2 id="production-title">🏭 Production</h2>
    <div id="production-recipes"></div>
    <button class="close-btn overlay-close" onclick="hideOverlay()">✕</button>
  </div>
</div>

<div id="login-bonus-overlay" class="overlay hidden">
  <div class="overlay-card login-bonus-card">
    <h2>🌅 Daily Login Bonus!</h2>
    <div id="login-days-row" class="login-days-row"></div>
    <div class="login-day-big">Day <span id="login-day">1</span></div>
    <div id="login-reward-detail" class="login-reward-detail"></div>
    <button class="action-btn" onclick="hideLoginBonus()">Collect!</button>
  </div>
</div>

<div id="session-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>🎉 Session Complete!</h2>
    <div id="session-stats"></div>
    <div id="session-items"></div>
    <button class="action-btn" onclick="hideOverlay()">Continue Farming!</button>
  </div>
</div>
